<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Video world model for robot control</title>
  <desc id="desc">A conceptual pipeline showing camera observations and robot actions entering a video world model, producing candidate futures evaluated by reward and safety filters.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #fff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
      .camera { fill: #ecfeff; stroke: #0891b2; }
      .action { fill: #fefce8; stroke: #ca8a04; }
      .video { fill: #eef2ff; stroke: #4f46e5; }
      .judge { fill: #f0fdf4; stroke: #16a34a; }
      .warn { fill: #fef2f2; stroke: #dc2626; }
      .title { font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .head { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .mini { font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .arrow { fill: none; stroke: #2563eb; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow); }
      .frame { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 6; }
    </style>
  </defs>
  <rect class="bg" width="1100" height="620"/>
  <text class="title" x="70" y="62">视频世界模型用于机器人控制：诱人但还不够闭环</text>
  <text class="small" x="72" y="96">视频模型能生成候选未来，但控制还需要动作条件、物理一致性和实时反馈。</text>

  <rect class="box camera" x="70" y="165" width="230" height="112"/>
  <text class="head" x="110" y="214">当前画面</text>
  <text class="small" x="110" y="246">camera observation</text>

  <rect class="box action" x="70" y="335" width="230" height="112"/>
  <text class="head" x="110" y="384">候选动作</text>
  <text class="small" x="110" y="416">push / grasp / move</text>

  <rect class="box video" x="405" y="210" width="290" height="190"/>
  <text class="head" x="457" y="260">视频世界模型</text>
  <text class="small" x="457" y="294">生成多个未来片段</text>
  <text class="mini" x="457" y="323">future_1, future_2, future_3...</text>
  <rect class="frame" x="455" y="345" width="54" height="32"/>
  <rect class="frame" x="525" y="345" width="54" height="32"/>
  <rect class="frame" x="595" y="345" width="54" height="32"/>

  <rect class="box judge" x="800" y="165" width="230" height="112"/>
  <text class="head" x="838" y="214">奖励评估</text>
  <text class="small" x="838" y="246">目标是否达成？</text>

  <rect class="box warn" x="800" y="335" width="230" height="112"/>
  <text class="head" x="838" y="384">安全过滤</text>
  <text class="small" x="838" y="416">是否可执行？</text>

  <rect class="box" x="405" y="495" width="290" height="72"/>
  <text class="head" x="468" y="539">执行第一步，再闭环观测</text>

  <path class="arrow" d="M300 221 C345 225, 365 244, 405 270"/>
  <path class="arrow" d="M300 391 C345 384, 365 356, 405 334"/>
  <path class="arrow" d="M695 275 C735 240, 760 220, 800 220"/>
  <path class="arrow" d="M695 335 C735 365, 760 390, 800 391"/>
  <path class="arrow" d="M915 447 C860 518, 760 534, 695 531"/>
  <path class="arrow" d="M405 531 C270 526, 170 480, 166 447"/>
</svg>
