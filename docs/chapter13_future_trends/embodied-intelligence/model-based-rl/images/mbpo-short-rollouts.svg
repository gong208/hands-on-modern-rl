<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">MBPO short model rollouts</title>
  <desc id="desc">A diagram of Model-Based Policy Optimization using short model rollouts branched from real replay data.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f766e"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #fff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
      .real { fill: #ecfeff; stroke: #0891b2; }
      .model { fill: #fff7ed; stroke: #ea580c; }
      .policy { fill: #f0fdf4; stroke: #16a34a; }
      .danger { fill: #fef2f2; stroke: #dc2626; }
      .title { font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .head { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .code { font: 16px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #334155; }
      .arrow { fill: none; stroke: #0f766e; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1100" height="620"/>
  <text class="title" x="70" y="62">MBPO：从真实数据分叉，只做短 rollout</text>
  <text class="small" x="72" y="96">核心折中：模型数据便宜，但 rollout 越长，模型偏差越容易累积。</text>

  <rect class="box real" x="70" y="170" width="270" height="260"/>
  <text class="head" x="112" y="218">真实 replay buffer</text>
  <text class="code" x="112" y="255">(s_1, a_1, r_1, s_2)</text>
  <text class="code" x="112" y="286">(s_2, a_2, r_2, s_3)</text>
  <text class="code" x="112" y="317">...</text>
  <text class="small" x="112" y="376">从真实状态采样分叉点</text>

  <rect class="box model" x="450" y="155" width="260" height="118"/>
  <text class="head" x="488" y="203">短模型 rollout</text>
  <text class="code" x="488" y="237">H = 1 ~ 5</text>
  <rect class="box danger" x="450" y="340" width="260" height="118"/>
  <text class="head" x="488" y="388">长 rollout 风险</text>
  <text class="small" x="488" y="422">模型偏差滚雪球</text>

  <rect class="box policy" x="805" y="215" width="230" height="154"/>
  <text class="head" x="852" y="263">策略更新</text>
  <text class="small" x="852" y="296">真实 + 模型数据</text>
  <text class="code" x="852" y="330">SAC / off-policy</text>

  <path class="arrow" d="M340 255 C388 225, 402 205, 450 205"/>
  <path class="arrow" d="M340 325 C398 350, 402 390, 450 398"/>
  <path class="arrow" d="M710 214 C750 230, 770 250, 805 271"/>
  <path class="arrow" d="M710 399 C762 392, 786 345, 805 320"/>

  <text class="small" x="450" y="520">论文结论可以理解成一句工程经验：不要无限相信模型，短而频繁地用。</text>
</svg>
