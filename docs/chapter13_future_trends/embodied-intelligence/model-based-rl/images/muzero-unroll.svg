<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">MuZero learned model unroll</title>
  <desc id="desc">A diagram of MuZero representation, dynamics, prediction heads, and tree search.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7c3aed"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #fff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
      .repr { fill: #ecfeff; stroke: #0891b2; }
      .dyn { fill: #eef2ff; stroke: #7c3aed; }
      .pred { fill: #fff7ed; stroke: #ea580c; }
      .search { fill: #f0fdf4; stroke: #16a34a; }
      .title { font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .head { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .code { font: 16px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #334155; }
      .arrow { fill: none; stroke: #7c3aed; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1100" height="620"/>
  <text class="title" x="70" y="62">MuZero：只学习“对规划有用”的模型</text>
  <text class="small" x="72" y="96">模型不重建完整环境，只预测 reward、value、policy 三个搜索需要的量。</text>

  <rect class="box repr" x="70" y="205" width="205" height="112"/>
  <text class="head" x="111" y="253">表示函数</text>
  <text class="code" x="111" y="285">h(o_1:t) -> s_0</text>

  <rect class="box dyn" x="375" y="160" width="230" height="88"/>
  <text class="head" x="421" y="209">动力学函数</text>
  <text class="code" x="421" y="233">g(s, a)</text>
  <rect class="box dyn" x="375" y="315" width="230" height="88"/>
  <text class="head" x="421" y="364">反复展开</text>
  <text class="code" x="421" y="388">s_1, s_2, ...</text>

  <rect class="box pred" x="705" y="130" width="250" height="112"/>
  <text class="head" x="750" y="178">预测头</text>
  <text class="code" x="750" y="211">policy, value, reward</text>
  <rect class="box search" x="705" y="340" width="250" height="112"/>
  <text class="head" x="750" y="388">树搜索</text>
  <text class="code" x="750" y="421">MCTS in latent</text>

  <path class="arrow" d="M275 261 C320 220, 338 205, 375 204"/>
  <path class="arrow" d="M490 248 L490 315"/>
  <path class="arrow" d="M605 203 C650 190, 670 185, 705 185"/>
  <path class="arrow" d="M605 359 C660 372, 680 390, 705 396"/>
  <path class="arrow" d="M830 242 L830 340"/>

  <text class="small" x="120" y="520">训练损失同时约束 reward、value、policy；搜索时只在学到的 latent state 中展开。</text>
</svg>
