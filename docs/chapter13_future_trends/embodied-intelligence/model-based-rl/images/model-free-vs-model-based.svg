<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">Model-Free versus Model-Based reinforcement learning</title>
  <desc id="desc">A side-by-side comparison of model-free reinforcement learning and model-based reinforcement learning.</desc>
  <defs>
    <marker id="arrow-slate" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #fff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
      .left { fill: #fef2f2; stroke: #dc2626; }
      .right { fill: #ecfdf5; stroke: #059669; }
      .center { fill: #eff6ff; stroke: #2563eb; }
      .title { font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .head { font: 700 27px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .tiny { font: 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .arrow { fill: none; stroke: #475569; stroke-width: 3.5; stroke-linecap: round; marker-end: url(#arrow-slate); }
    </style>
  </defs>
  <rect class="bg" width="1100" height="560"/>
  <text class="title" x="70" y="58">Model-Free 与 Model-Based 的核心差别</text>
  <text class="small" x="72" y="92">前者直接从反馈中更新策略，后者先学习“动作如何改变世界”。</text>

  <rect class="card left" x="70" y="145" width="430" height="330"/>
  <text class="head" x="110" y="198">Model-Free RL</text>
  <rect class="card" x="115" y="235" width="140" height="72"/>
  <text class="label" x="154" y="280">环境</text>
  <rect class="card" x="315" y="235" width="140" height="72"/>
  <text class="label" x="355" y="280">策略</text>
  <path class="arrow" d="M255 270 L315 270"/>
  <path class="arrow" d="M385 307 C380 355, 225 355, 185 307"/>
  <text class="small" x="113" y="392">特点：结构简单，工程稳定</text>
  <text class="small" x="113" y="425">代价：需要大量真实或仿真交互</text>

  <rect class="card right" x="600" y="145" width="430" height="330"/>
  <text class="head" x="640" y="198">Model-Based RL</text>
  <rect class="card" x="635" y="235" width="118" height="72"/>
  <text class="label" x="673" y="280">环境</text>
  <rect class="card center" x="792" y="220" width="160" height="102"/>
  <text class="label" x="824" y="263">世界模型</text>
  <text class="tiny" x="822" y="291">预测未来</text>
  <rect class="card" x="792" y="365" width="160" height="72"/>
  <text class="label" x="841" y="410">策略</text>
  <path class="arrow" d="M753 270 L792 270"/>
  <path class="arrow" d="M872 322 L872 365"/>
  <path class="arrow" d="M792 401 C730 395, 685 358, 694 307"/>
  <text class="small" x="638" y="500">特点：样本效率高，可规划、可想象训练</text>
  <text class="small" x="638" y="528">风险：模型误差会被规划过程放大</text>
</svg>
