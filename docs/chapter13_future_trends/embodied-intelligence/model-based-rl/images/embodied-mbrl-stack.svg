<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Embodied model-based reinforcement learning stack</title>
  <desc id="desc">A layered stack showing sensors, latent state, world model, planner, safety filter, and robot action.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f766e"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .layer { stroke-width: 2; stroke: #cbd5e1; rx: 8; }
      .title { font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .head { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .mini { font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .arrow { fill: none; stroke: #0f766e; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1100" height="620"/>
  <text class="title" x="70" y="62">具身智能中的 MBRL 栈</text>
  <text class="small" x="72" y="96">世界模型不是孤立模块，它夹在感知、规划、安全约束和真机控制之间。</text>

  <rect class="layer" x="135" y="145" width="830" height="64" fill="#ecfeff"/>
  <text class="head" x="174" y="186">传感器观测</text>
  <text class="small" x="355" y="186">RGB-D / IMU / 力觉 / 关节编码器</text>

  <rect class="layer" x="135" y="235" width="830" height="64" fill="#eff6ff"/>
  <text class="head" x="174" y="276">潜空间状态</text>
  <text class="small" x="355" y="276">把高维观测压缩成控制相关表征 z_t</text>

  <rect class="layer" x="135" y="325" width="830" height="64" fill="#fff7ed"/>
  <text class="head" x="174" y="366">世界模型</text>
  <text class="small" x="355" y="366">预测 z_{t+1}、奖励、不确定性与终止概率</text>

  <rect class="layer" x="135" y="415" width="390" height="72" fill="#f0fdf4"/>
  <text class="head" x="174" y="456">规划 / 策略</text>
  <text class="mini" x="174" y="478">MPC、MCTS、actor-critic imagination</text>

  <rect class="layer" x="575" y="415" width="390" height="72" fill="#fdf2f8"/>
  <text class="head" x="614" y="456">安全过滤</text>
  <text class="mini" x="614" y="478">碰撞、关节限位、速度与力矩约束</text>

  <rect class="layer" x="135" y="520" width="830" height="64" fill="#fefce8"/>
  <text class="head" x="174" y="561">机器人动作</text>
  <text class="small" x="355" y="561">目标关节角 / 力矩 / 末端执行器轨迹</text>

  <path class="arrow" d="M550 209 L550 235"/>
  <path class="arrow" d="M550 299 L550 325"/>
  <path class="arrow" d="M550 389 L420 415"/>
  <path class="arrow" d="M550 389 L690 415"/>
  <path class="arrow" d="M330 487 C360 518, 420 520, 512 520"/>
  <path class="arrow" d="M770 487 C740 518, 680 520, 588 520"/>
</svg>
