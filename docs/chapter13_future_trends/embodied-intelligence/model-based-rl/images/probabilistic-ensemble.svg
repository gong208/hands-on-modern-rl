<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">PETS probabilistic ensemble dynamics</title>
  <desc id="desc">A diagram of probabilistic ensemble dynamics used in PETS, showing several neural dynamics models predicting means and variances.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #fff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
      .input { fill: #ecfeff; stroke: #0891b2; }
      .model { fill: #eff6ff; stroke: #2563eb; }
      .uncertain { fill: #fff7ed; stroke: #ea580c; }
      .output { fill: #f0fdf4; stroke: #16a34a; }
      .title { font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .head { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .code { font: 17px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #334155; }
      .arrow { fill: none; stroke: #2563eb; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1100" height="620"/>
  <text class="title" x="70" y="62">PETS：用概率模型集成表达“不确定性”</text>
  <text class="small" x="72" y="96">每个模型预测一个高斯分布；模型之间的分歧代表 epistemic uncertainty。</text>

  <rect class="box input" x="75" y="230" width="215" height="135"/>
  <text class="head" x="115" y="280">输入</text>
  <text class="code" x="115" y="315">x = [s_t, a_t]</text>
  <text class="small" x="115" y="346">状态 + 动作</text>

  <rect class="box model" x="405" y="145" width="260" height="70"/>
  <text class="head" x="448" y="188">动力学模型 1</text>
  <text class="code" x="448" y="210">mu_1, sigma_1</text>
  <rect class="box model" x="405" y="260" width="260" height="70"/>
  <text class="head" x="448" y="303">动力学模型 2</text>
  <text class="code" x="448" y="325">mu_2, sigma_2</text>
  <rect class="box model" x="405" y="375" width="260" height="70"/>
  <text class="head" x="448" y="418">动力学模型 K</text>
  <text class="code" x="448" y="440">mu_K, sigma_K</text>

  <rect class="box uncertain" x="780" y="182" width="245" height="112"/>
  <text class="head" x="824" y="228">不确定性传播</text>
  <text class="small" x="824" y="260">trajectory sampling</text>
  <rect class="box output" x="780" y="350" width="245" height="112"/>
  <text class="head" x="824" y="396">预测轨迹</text>
  <text class="code" x="824" y="428">s_{t+1:t+H}, r</text>

  <path class="arrow" d="M290 298 C335 244, 355 184, 405 180"/>
  <path class="arrow" d="M290 298 L405 295"/>
  <path class="arrow" d="M290 298 C335 352, 355 410, 405 410"/>
  <path class="arrow" d="M665 180 C710 185, 740 210, 780 230"/>
  <path class="arrow" d="M665 295 C710 292, 740 270, 780 250"/>
  <path class="arrow" d="M665 410 C715 392, 745 344, 780 282"/>
  <path class="arrow" d="M902 294 L902 350"/>

  <text class="small" x="403" y="515">单模型会过度自信；模型集成让规划器知道哪里“不该太相信模型”。</text>
</svg>
